name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (app + service worker)
        run: pnpm run check

      - name: Unit tests + Sprint 1 rollup verify
        run: pnpm run verify:sprint1

      - name: Production build
        run: pnpm run build

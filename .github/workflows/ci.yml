name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CI workflow matches packageManager
        run: node scripts/verify-ci-workflow.mjs

      # Use packageManager from package.json (pnpm@10.x) — do not pin `version:` here.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (app + service worker)
        run: pnpm run check

      - name: Unit + clinical engine tests
        run: pnpm run test:unit && pnpm run test:clinical

      - name: Sprint 1 rollup verify
        run: pnpm run verify:sprint1

      - name: Production build
        run: pnpm run build

  # Optional: set repository variable E2E_HOLISTIC_ENABLED=true and secrets
  # E2E_PROVIDER_EMAIL / E2E_PROVIDER_PASSWORD (secrets cannot be used in job `if`).
  e2e-holistic:
    if: vars.E2E_HOLISTIC_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - name: Holistic loop E2E
        env:
          E2E_PROVIDER_EMAIL: ${{ secrets.E2E_PROVIDER_EMAIL }}
          E2E_PROVIDER_PASSWORD: ${{ secrets.E2E_PROVIDER_PASSWORD }}
        run: pnpm run test:e2e:holistic
